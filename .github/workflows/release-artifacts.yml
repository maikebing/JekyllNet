name: release-artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version override, for example 0.1.1"
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  pack-and-publish-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./JekyllNet.slnx

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ github.event.inputs.version }}"
          fi

          if [ -z "$version" ]; then
            echo "package_version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "package_version=$version" >> "$GITHUB_OUTPUT"

      - name: Pack dotnet tool
        shell: bash
        run: |
          args=(
            pack ./JekyllNet.Cli/JekyllNet.Cli.csproj
            --configuration Release
            --no-restore
            --output ./artifacts/nupkg
          )

          if [ -n "${{ steps.version.outputs.package_version }}" ]; then
            args+=(-p:Version=${{ steps.version.outputs.package_version }})
          fi

          dotnet "${args[@]}"

      - name: Publish Windows portable build
        run: dotnet publish ./JekyllNet.Cli/JekyllNet.Cli.csproj --configuration Release --no-restore --runtime win-x64 --self-contained true -p:PublishSingleFile=true -o ./artifacts/publish/win-x64

      - name: Archive Windows portable build
        shell: pwsh
        run: Compress-Archive -Path ./artifacts/publish/win-x64/* -DestinationPath ./artifacts/JekyllNet-win-x64.zip

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            ./artifacts/nupkg
            ./artifacts/JekyllNet-win-x64.zip
