name: release-artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version override, for example 0.1.1"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  pack-and-publish-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore ./JekyllNet.slnx

      - name: Resolve package version
        id: version
        shell: pwsh
        run: >
          dotnet run --project ./scripts/JekyllNet.ReleaseTool/JekyllNet.ReleaseTool.csproj --
          resolve-version
          --project ./JekyllNet.Cli/JekyllNet.Cli.csproj
          --github-ref-type '${{ github.ref_type }}'
          --github-ref-name '${{ github.ref_name }}'
          --input-version '${{ github.event.inputs.version }}'
          --github-output $env:GITHUB_OUTPUT

      - name: Test
        run: dotnet test ./JekyllNet.slnx --configuration Release --no-restore

      - name: Pack dotnet tool
        shell: pwsh
        run: |
          $args = @(
            'pack',
            './JekyllNet.Cli/JekyllNet.Cli.csproj',
            '--configuration', 'Release',
            '--no-restore',
            '--output', './artifacts/nupkg',
            "-p:Version=${{ steps.version.outputs.package_version }}"
          )

          dotnet @args

      - name: Publish Windows portable build
        shell: pwsh
        run: |
          $args = @(
            'publish',
            './JekyllNet.Cli/JekyllNet.Cli.csproj',
            '--configuration', 'Release',
            '--runtime', 'win-x64',
            '--self-contained', 'true',
            '-p:PublishSingleFile=true',
            "-p:Version=${{ steps.version.outputs.package_version }}",
            '-o', './artifacts/publish/win-x64'
          )

          dotnet @args

      - name: Archive Windows portable build
        shell: pwsh
        run: Compress-Archive -Path ./artifacts/publish/win-x64/* -DestinationPath ./artifacts/JekyllNet-win-x64.zip

      - name: Generate release checksums
        id: checksums
        shell: pwsh
        run: >
          dotnet run --project ./scripts/JekyllNet.ReleaseTool/JekyllNet.ReleaseTool.csproj --
          write-sha256
          --file ./artifacts/JekyllNet-win-x64.zip
          --asset-name JekyllNet-win-x64.zip
          --output ./artifacts/SHA256SUMS.txt
          --github-output $env:GITHUB_OUTPUT
          --github-output-key windows_x64_zip_sha256

      - name: Generate winget manifests
        id: winget
        shell: pwsh
        run: >
          dotnet run --project ./scripts/JekyllNet.ReleaseTool/JekyllNet.ReleaseTool.csproj --
          export-winget-manifest
          --version '${{ steps.version.outputs.package_version }}'
          --installer-url 'https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.release_tag }}/JekyllNet-win-x64.zip'
          --zip-path ./artifacts/JekyllNet-win-x64.zip
          --output-directory ./artifacts/winget

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: JekyllNet ${{ steps.version.outputs.package_version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ./artifacts/JekyllNet-win-x64.zip
            ./artifacts/SHA256SUMS.txt
            ./artifacts/nupkg/*.nupkg
            ./artifacts/winget/JekyllNet.JekyllNet/${{ steps.version.outputs.package_version }}/*.yaml

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-artifacts-${{ steps.version.outputs.package_version }}
          if-no-files-found: error
          path: |
            ./artifacts/nupkg
            ./artifacts/JekyllNet-win-x64.zip
            ./artifacts/SHA256SUMS.txt
            ./artifacts/winget
