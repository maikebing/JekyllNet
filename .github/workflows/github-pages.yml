name: github-pages

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - JekyllNet.Cli/**
      - JekyllNet.Core/**
      - JekyllNet.slnx
      - .github/workflows/github-pages.yml
  pull_request:
    paths:
      - docs/**
      - JekyllNet.Cli/**
      - JekyllNet.Core/**
      - JekyllNet.slnx
      - .github/workflows/github-pages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./JekyllNet.slnx

      - name: Build docs site
        run: >
          dotnet run --project ./JekyllNet.Cli/JekyllNet.Cli.csproj --
          build
          --source ./docs
          --destination ./artifacts/docs-site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./artifacts/docs-site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
