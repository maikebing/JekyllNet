name: publish-dotnet-tool

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "NuGet package version to publish, for example 0.1.1"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-dotnet-tool
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        id: version
        shell: pwsh
        run: >
          dotnet run --project ./scripts/JekyllNet.ReleaseTool/JekyllNet.ReleaseTool.csproj --
          resolve-version
          --project ./JekyllNet.Cli/JekyllNet.Cli.csproj
          --github-ref-type '${{ github.ref_type }}'
          --github-ref-name '${{ github.ref_name }}'
          --input-version '${{ github.event.inputs.version }}'
          --github-output $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ./JekyllNet.slnx

      - name: Test
        run: dotnet test ./JekyllNet.slnx --configuration Release --no-restore

      - name: Pack dotnet tool
        run: >
          dotnet pack ./JekyllNet.Cli/JekyllNet.Cli.csproj
          --configuration Release
          --no-restore
          --output ./artifacts/nupkg
          -p:Version=${{ steps.version.outputs.package_version }}

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v6
        with:
          name: dotnet-tool-package-${{ steps.version.outputs.package_version }}
          path: ./artifacts/nupkg

      - name: Publish to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::Repository secret NUGET_API_KEY is required."
            exit 1
          fi

          dotnet nuget push "./artifacts/nupkg/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "::error::GITHUB_TOKEN is required for GitHub Packages publishing."
            exit 1
          fi

          dotnet nuget push "./artifacts/nupkg/*.nupkg" \
            --api-key "$GITHUB_TOKEN" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate
